<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h2{
            position: relative;
            bottom: 40px;
            font-size: 40px;
        }
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: rgb(203, 193, 179);
            height: 400px;
            width: 400px;
            border-radius: 20px;
            border: 2px black;
        }
        label{
            position: relative;
            right: 70px;
            font-size: 20px;
        }
        input{
            font-size: 20px;
            border-radius: 10px;
        }
        .btn{
            width: 100px;
        }
        #Register{
            position: relative;
            top: 20px;
            left: 130px;
            font-size: 20px;
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <form>
            <h2>login</h2>
            <label>username</label>
            <input type="text" placeholder="username">
            <br><br>
            <label>password</label>
            <input type="text" placeholder="password">
            <br><br>
            <input type="submit" value="Login" class="btn"
        </form>
    </div>
</body>
</html>
