<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ModernCommerce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <iframe src="header.html" class="header-frame" frameborder="0"></iframe>

    <div class="page-banner">
        <h1>My Profile</h1>
        <p>Manage your account details.</p>
    </div>

    <div class="profile-section">
        <div class="profile-layout">

           
            <div class="profile-sidebar">
                <div class="user-avatar" id="avatar-letter">?</div>
                <h3 id="sidebar-name">Loading...</h3>
                <p class="user-email" id="sidebar-email"></p>

                <div class="sidebar-menu">
                    <a href="myprofile.html" class="active">
                        <i class="fa-solid fa-user"></i> My Profile
                    </a>
                    <a href="orderhistory.html">
                        <i class="fa-solid fa-bag-shopping"></i> Order History
                    </a>
                    <a href="#" id="logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </div>
            </div>

        
            <div class="profile-form-box">
                <h2>Personal Information</h2>

                <div class="two-inputs">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="fname" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lname" placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 00000 00000">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="123, Street Name, City">
                </div>

                <div class="two-inputs">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="Mumbai">
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" id="pincode" placeholder="400001">
                    </div>
                </div>

                <hr style="margin: 25px 0; border: none; border-top: 1px solid #eee;">
                <h2>Change Password</h2>

                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="current-password" placeholder="Enter current password">
                </div>

                <div class="two-inputs">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" placeholder="New password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="Confirm password">
                    </div>
                </div>

                <p id="password-error" style="color:#e53e3e; font-size:13px; display:none;"></p>

                <button class="blue-btn" onclick="saveProfile()">Save Changes</button>

                <div class="save-success" id="save-msg" style="display:none;">
                    <i class="fa-solid fa-circle-check"></i> Profile saved successfully!
                </div>
            </div>

        </div>
    </div>

    <iframe src="footer.html" class="footer-frame" frameborder="0"></iframe>

    <script>
     
        var currentUser = JSON.parse(localStorage.getItem("mc_logged_in_user") || "null");

        if (!currentUser) {
         
            window.location.href = "login.html";
        }

       
        window.onload = function() {
            currentUser = JSON.parse(localStorage.getItem("mc_logged_in_user") || "null");
            if (!currentUser) return;

        
            var saved = JSON.parse(localStorage.getItem("mc_profile") || "{}");

            setVal("fname",   saved.fname   || currentUser.fname   || "");
            setVal("lname",   saved.lname   || currentUser.lname   || "");
            setVal("email",   saved.email   || currentUser.email   || "");
            setVal("phone",   saved.phone   || currentUser.phone   || "");
            setVal("address", saved.address || currentUser.address || "");
            setVal("city",    saved.city    || currentUser.city    || "");
            setVal("pincode", saved.pincode || currentUser.pincode || "");

            updateSidebar(currentUser);
        };

        function setVal(id, val) {
            var el = document.getElementById(id);
            if (el) el.value = val;
        }

     
        function saveProfile() {
            var passwordError = document.getElementById("password-error");
            passwordError.style.display = "none";

          
            var currentPw  = document.getElementById("current-password").value;
            var newPw      = document.getElementById("new-password").value;
            var confirmPw  = document.getElementById("confirm-password").value;

            if (currentPw || newPw || confirmPw) {
               
                var users = JSON.parse(localStorage.getItem("mc_users") || "[]");
                var userIndex = users.findIndex(function(u) {
                    return u.email.toLowerCase() === currentUser.email.toLowerCase();
                });

                if (userIndex === -1) {
                    passwordError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> User not found.';
                    passwordError.style.display = "block";
                    return;
                }

                if (users[userIndex].password !== currentPw) {
                    passwordError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Current password is incorrect.';
                    passwordError.style.display = "block";
                    return;
                }

                if (newPw.length < 6) {
                    passwordError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> New password must be at least 6 characters.';
                    passwordError.style.display = "block";
                    return;
                }

                if (newPw !== confirmPw) {
                    passwordError.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> New passwords do not match.';
                    passwordError.style.display = "block";
                    return;
                }

              
                users[userIndex].password = newPw;
                localStorage.setItem("mc_users", JSON.stringify(users));

                
                document.getElementById("current-password").value = "";
                document.getElementById("new-password").value = "";
                document.getElementById("confirm-password").value = "";
            }

           
            var data = {
                fname:   document.getElementById("fname").value.trim(),
                lname:   document.getElementById("lname").value.trim(),
                email:   document.getElementById("email").value.trim(),
                phone:   document.getElementById("phone").value.trim(),
                address: document.getElementById("address").value.trim(),
                city:    document.getElementById("city").value.trim(),
                pincode: document.getElementById("pincode").value.trim()
            };

            localStorage.setItem("mc_profile", JSON.stringify(data));


            var updatedUser = Object.assign({}, currentUser, data);
            localStorage.setItem("mc_logged_in_user", JSON.stringify(updatedUser));
            currentUser = updatedUser;

            var users = JSON.parse(localStorage.getItem("mc_users") || "[]");
            var idx = users.findIndex(function(u) {
                return u.email.toLowerCase() === currentUser.email.toLowerCase() ||
                       u.email.toLowerCase() === (currentUser._originalEmail || "").toLowerCase();
            });
            if (idx !== -1) {
                users[idx].email = data.email;
                users[idx].name  = (data.fname + " " + data.lname).trim();
                localStorage.setItem("mc_users", JSON.stringify(users));
            }

            updateSidebar(data);

           
            var msg = document.getElementById("save-msg");
            msg.style.display = "block";
            setTimeout(function() { msg.style.display = "none"; }, 3000);
        }

        function updateSidebar(data) {
            var fullName = ((data.fname || "") + " " + (data.lname || "")).trim();
            if (!fullName) fullName = data.name || "User";

            document.getElementById("sidebar-name").innerText = fullName;
            document.getElementById("avatar-letter").innerText = fullName.charAt(0).toUpperCase();

            if (data.email) {
                document.getElementById("sidebar-email").innerText = data.email;
            }
        }

        document.getElementById("logout-btn").addEventListener("click", function(e) {
            e.preventDefault();
            localStorage.removeItem("mc_logged_in_user");
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
