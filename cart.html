<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | ModernCommerce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <iframe src="header.html" class="header-frame" frameborder="0"></iframe>

    <div class="page-banner">
        <h1>My Cart</h1>
        <p>Review your items before checkout.</p>
    </div>

    <div class="cart-section">
        <div class="cart-layout">

  
            <div class="cart-items-box">
                <div class="cart-top-bar">
                    Cart Items <span id="item-count" style="font-weight:normal; color:#888;"></span>
                </div>
\
                <div id="cart-items-list"></div>

           \
                <div class="empty-cart-msg" id="empty-msg" style="display:none;">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <p>Your cart is empty.</p>
                    <br>
                    <a href="index.html" class="blue-btn">Shop Now</a>
                </div>

            </div>

        \
            <div class="cart-summary">
                <h3>Order Summary</h3>

                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="subtotal-price">₹0</span>
                </div>
                <div class="summary-line">
                    <span>Shipping</span>
                    <span style="color: green;">Free</span>
                </div>
                <div class="summary-line">
                    <span>Tax</span>
                    <span>₹0</span>
                </div>

                <div class="summary-total-line">
                    <span>Total</span>
                    <span id="total-price">₹0</span>
                </div>

                <br>
                <a href="payment.html" class="blue-btn full-width-btn">Proceed to Checkout</a>
                <br><br>
                <a href="index.html" style="display:block; text-align:center; color:#4f46e5; font-size:14px;">← Continue Shopping</a>
            </div>

        </div>
    </div>

    <iframe src="footer.html" class="footer-frame" frameborder="0"></iframe>

    <script>
        // Load cart from localStorage
        var cartItems = JSON.parse(localStorage.getItem("mc_cart") || "[]");

        window.onload = function() {
            renderCart();
        };

        function renderCart() {
            var list = document.getElementById("cart-items-list");
            list.innerHTML = "";

            if (cartItems.length === 0) {
                document.getElementById("empty-msg").style.display = "block";
                document.getElementById("item-count").innerText = "(0 items)";
                updateTotal();
                return;
            }

            document.getElementById("empty-msg").style.display = "none";
            document.getElementById("item-count").innerText = "(" + cartItems.length + " item" + (cartItems.length !== 1 ? "s" : "") + ")";

            for (var i = 0; i < cartItems.length; i++) {
                var item = cartItems[i];
                var index = i;

                var row = document.createElement("div");
                row.className = "cart-row";
                row.id = "row-" + i;

                row.innerHTML =
                    '<img src="' + item.img + '" alt="' + item.name + '">' +
                    '<div class="cart-item-info">' +
                        '<p class="item-category">' + item.category + '</p>' +
                        '<h3>' + item.name + '</h3>' +
                        '<p class="item-price" id="item-price-' + i + '">₹' + (item.price * item.qty).toLocaleString("en-IN") + '</p>' +
                    '</div>' +
                    '<div class="qty-btns">' +
                        '<button onclick="decreaseItem(' + i + ')">-</button>' +
                        '<span id="item-qty-' + i + '">' + item.qty + '</span>' +
                        '<button onclick="increaseItem(' + i + ')">+</button>' +
                    '</div>' +
                    '<button class="remove-btn" onclick="removeItem(' + i + ')">' +
                        '<i class="fa-solid fa-trash"></i>' +
                    '</button>';

                list.appendChild(row);
            }

            updateTotal();
        }

        function increaseItem(index) {
            if (cartItems[index].qty < 10) {
                cartItems[index].qty++;
                saveCart();
                document.getElementById("item-qty-" + index).innerText = cartItems[index].qty;
                document.getElementById("item-price-" + index).innerText = "₹" + (cartItems[index].price * cartItems[index].qty).toLocaleString("en-IN");
                updateTotal();
            }
        }

        function decreaseItem(index) {
            if (cartItems[index].qty > 1) {
                cartItems[index].qty--;
                saveCart();
                document.getElementById("item-qty-" + index).innerText = cartItems[index].qty;
                document.getElementById("item-price-" + index).innerText = "₹" + (cartItems[index].price * cartItems[index].qty).toLocaleString("en-IN");
                updateTotal();
            }
        }

        function removeItem(index) {
            cartItems.splice(index, 1);
            saveCart();
            renderCart(); 
        }

        function updateTotal() {
            var total = 0;
            for (var i = 0; i < cartItems.length; i++) {
                total += cartItems[i].price * cartItems[i].qty;
            }
            document.getElementById("subtotal-price").innerText = "₹" + total.toLocaleString("en-IN");
            document.getElementById("total-price").innerText    = "₹" + total.toLocaleString("en-IN");
        }

        function saveCart() {
            localStorage.setItem("mc_cart", JSON.stringify(cartItems));
        }
    </script>

</body>
</html>
