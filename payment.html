<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | ModernCommerce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <iframe src="header.html" class="header-frame" frameborder="0"></iframe>

    <div class="payment-section">
        <div class="payment-layout">

    
            <div class="payment-form-box">
                <h2>Payment Details</h2>

                <div class="pay-method-options">
                    <h4>Select Payment Method</h4>
                    <label>
                        <input type="radio" name="pay-method" value="upi" checked> UPI (Google Pay, PhonePe, Paytm)
                    </label>
                    <label>
                        <input type="radio" name="pay-method" value="card"> Credit / Debit Card
                    </label>
                    <label>
                        <input type="radio" name="pay-method" value="cod"> Cash on Delivery (COD)
                    </label>
                </div>

                <div class="form-group" id="upi-field">
                    <label>UPI ID</label>
                    <input type="text" id="upi-id" placeholder="username@upi">
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="buyer-name" placeholder="John Doe" required>
                </div>

                <button class="blue-btn full-width-btn" onclick="placeOrder()">Pay <span id="pay-btn-total">₹0</span></button>
            </div>

       
            <div class="order-summary-box">
                <h2>Order Summary</h2>

             
                <div id="summary-items"></div>

                <div class="order-summary-line">
                    <span>Subtotal</span><span id="summary-subtotal">₹0</span>
                </div>
                <div class="order-summary-line">
                    <span>Shipping</span><span style="color:green;">Free</span>
                </div>
                <div class="order-summary-line">
                    <span>Tax</span><span>₹0</span>
                </div>

                <div class="order-summary-total">
                    <span>Total</span><span id="summary-total">₹0</span>
                </div>

                <p style="text-align:center; font-size:13px; color:#888; margin-top:14px;">
                    <i class="fa-solid fa-lock" style="color:green;"></i> Payments are secure and encrypted
                </p>
            </div>

        </div>
    </div>

    <iframe src="footer.html" class="footer-frame" frameborder="0"></iframe>


    <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">

                <div class="mb-3">
                    <div style="width:70px; height:70px; background-color:#dcfce7; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto;">
                        <i class="fa-solid fa-check" style="font-size:28px; color:#16a34a;"></i>
                    </div>
                </div>

                <h4 class="modal-title mb-2" id="orderModalLabel">Order Placed!</h4>
                <p class="text-muted mb-1">Your order has been placed successfully.</p>
                <p class="text-muted mb-4">You can view it in your order history.</p>

                <div class="d-flex gap-2 justify-content-center">
                    <a href="orderhistory.html" class="btn btn-primary">View Orders</a>
                    <a href="index.html" class="btn btn-outline-secondary">Continue Shopping</a>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
 
        var cartItems = JSON.parse(localStorage.getItem("mc_cart") || "[]");

        window.onload = function() {
            loadSummary();
        };

        function loadSummary() {
            var summaryDiv = document.getElementById("summary-items");
            summaryDiv.innerHTML = "";
            var total = 0;

            if (cartItems.length === 0) {
                summaryDiv.innerHTML = '<p style="color:#888; font-size:14px;">No items in cart. <a href="index.html">Shop Now</a></p>';
            }

            for (var i = 0; i < cartItems.length; i++) {
                var item = cartItems[i];
                total += item.price * item.qty;

                var row = document.createElement("div");
                row.className = "order-product-row";
                row.innerHTML =
                    '<img src="' + item.img + '" alt="' + item.name + '">' +
                    '<div class="op-name">' + item.name + '<br><span style="font-weight:normal; font-size:12px; color:#888;">Qty: ' + item.qty + '</span></div>' +
                    '<div class="op-price">₹' + (item.price * item.qty).toLocaleString("en-IN") + '</div>';

                summaryDiv.appendChild(row);
            }

            var formatted = "₹" + total.toLocaleString("en-IN");
            document.getElementById("summary-subtotal").innerText = formatted;
            document.getElementById("summary-total").innerText    = formatted;
            document.getElementById("pay-btn-total").innerText    = formatted;
        }
d
        var radioButtons = document.querySelectorAll('input[name="pay-method"]');
        for (var i = 0; i < radioButtons.length; i++) {
            radioButtons[i].addEventListener("change", function() {
                if (this.value === "cod") {
                    document.getElementById("upi-field").style.display = "none";
                } else {
                    document.getElementById("upi-field").style.display = "block";
                }
            });
        }

        function placeOrder() {
            var name = document.getElementById("buyer-name").value.trim();
            if (name === "") {
                alert("Please enter your full name.");
                return;
            }

            if (cartItems.length === 0) {
                alert("Your cart is empty!");
                return;
            }

          
            var today = new Date();
            var dateText = today.toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" });
            var orderNumber = "MC" + Date.now().toString().slice(-6);

            var total = 0;
            var orderItems = [];
            for (var i = 0; i < cartItems.length; i++) {
                total += cartItems[i].price * cartItems[i].qty;
                orderItems.push({
                    name:  cartItems[i].name,
                    type:  cartItems[i].category,
                    img:   cartItems[i].img,
                    price: cartItems[i].price,
                    qty:   cartItems[i].qty
                });
            }

            var newOrder = {
                id:     orderNumber,
                date:   dateText,
                status: "processing",
                total:  total,
                items:  orderItems
            };

            var allOrders = JSON.parse(localStorage.getItem("mc_orders") || "[]");
            allOrders.push(newOrder);
            localStorage.setItem("mc_orders", JSON.stringify(allOrders));

            localStorage.removeItem("mc_cart");

            var modal = new bootstrap.Modal(document.getElementById("orderModal"));
            modal.show();
        }
    </script>

</body>
</html>
