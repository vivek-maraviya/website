<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ModernCommerce</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <iframe src="header.html" class="header-frame" frameborder="0"></iframe>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p class="sub-text">Join ModernCommerce today.</p>

            <div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                </div>

                <p class="error-msg" id="signup-error"></p>

                <button type="button" class="blue-btn full-width-btn" onclick="handleSignup()">Create Account</button>
            </div>

            <p class="auth-bottom-text">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
       
        (function() {
            var user = localStorage.getItem("mc_logged_in_user");
            if (user) window.location.href = "index.html";
        })();

        function handleSignup() {
            var name     = document.getElementById("signup-name").value.trim();
            var email    = document.getElementById("signup-email").value.trim();
            var password = document.getElementById("signup-password").value;
            var confirm  = document.getElementById("signup-confirm").value;
            var errorEl  = document.getElementById("signup-error");

          
            if (!name || !email || !password || !confirm) {
                showError("Please fill in all fields.");
                return;
            }

            if (password.length < 6) {
                showError("Password must be at least 6 characters.");
                return;
            }

            if (password !== confirm) {
                showError("Passwords do not match.");
                return;
            }

            
            var users = JSON.parse(localStorage.getItem("mc_users") || "[]");
            var exists = users.find(function(u) {
                return u.email.toLowerCase() === email.toLowerCase();
            });

            if (exists) {
                showError("An account with this email already exists. <a href='login.html'>Sign in</a>");
                return;
            }

            
            var nameParts = name.split(" ");
            var newUser = {
                name:     name,
                email:    email,
                password: password
            };
            users.push(newUser);
            localStorage.setItem("mc_users", JSON.stringify(users));

            
            var loggedInData = {
                email: email,
                name:  name,
                fname: nameParts[0] || "",
                lname: nameParts.slice(1).join(" ") || "",
                phone:   "",
                address: "",
                city:    "",
                pincode: ""
            };
            localStorage.setItem("mc_logged_in_user", JSON.stringify(loggedInData));

          
            localStorage.setItem("mc_profile", JSON.stringify(loggedInData));

            errorEl.style.display = "none";
            window.location.href = "index.html";
        }

        function showError(msg) {
            var errorEl = document.getElementById("signup-error");
            errorEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + msg;
            errorEl.style.display = "block";
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") handleSignup();
        });
    </script>

</body>
</html>
